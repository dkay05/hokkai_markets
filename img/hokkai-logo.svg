<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <defs>
    <!-- Red gradient for H box -->
    <linearGradient id="boxGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF2D55"/>
      <stop offset="1" stop-color="#E50914"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="boxGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- H Icon Box -->
  <rect x="4" y="10" width="80" height="80" rx="16" fill="url(#boxGrad)" filter="url(#boxGlow)"/>
  <!-- Inner H letter -->
  <path d="M22 26 L22 74 L34 74 L34 56 L54 56 L54 74 L66 74 L66 26 L54 26 L54 44 L34 44 L34 26 Z" fill="white"/>
  <!-- Underline accent -->
  <rect x="22" y="79" width="44" height="4" rx="2" fill="rgba(255,255,255,0.35)"/>

  <!-- HOKKAI text -->
  <text x="102" y="52" 
    font-family="'Michroma', 'Arial Black', Impact, sans-serif" 
    font-size="38" 
    font-weight="900"
    letter-spacing="3"
    fill="white"
    filter="url(#glow)">HOKKAI</text>

  <!-- MARKETS subtext -->
  <text x="103" y="71" 
    font-family="'JetBrains Mono', 'Courier New', monospace" 
    font-size="11.5" 
    font-weight="400"
    letter-spacing="9"
    fill="#E50914">MARKETS</text>

  <!-- Red line accents around MARKETS -->
  <line x1="103" y1="77" x2="123" y2="77" stroke="#E50914" stroke-width="1.5" opacity="0.6"/>
  <line x1="280" y1="77" x2="300" y2="77" stroke="#E50914" stroke-width="1.5" opacity="0.6"/>
</svg>
